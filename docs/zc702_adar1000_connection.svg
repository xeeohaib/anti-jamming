<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="monospace, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#f5f7fa" rx="10"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">ZC702 ↔ ADAR1000 Hardware Connection Diagram</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#555">Jumper wires from PMOD JA1 (J55) on ZC702 to ADAR1000 Evaluation Board</text>

  <!-- ═══════════════════ ZC702 Board ═══════════════════ -->
  <!-- PCB outline -->
  <rect x="40" y="80" width="320" height="480" rx="12" fill="#1a6b3c" stroke="#0d4a2a" stroke-width="3"/>
  <!-- PCB label -->
  <text x="200" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Xilinx ZC702</text>
  <text x="200" y="122" text-anchor="middle" font-size="12" fill="#aaffaa">Zynq-7000 XC7Z020-CLG484</text>

  <!-- FPGA chip outline -->
  <rect x="110" y="145" width="180" height="140" rx="6" fill="#0d3d24" stroke="#5dba7c" stroke-width="1.5"/>
  <text x="200" y="208" text-anchor="middle" font-size="12" fill="#5dba7c">FPGA</text>
  <text x="200" y="224" text-anchor="middle" font-size="10" fill="#5dba7c">XC7Z020</text>
  <text x="200" y="240" text-anchor="middle" font-size="9" fill="#88cc99">PL + PS (ARM A9)</text>
  <text x="200" y="258" text-anchor="middle" font-size="9" fill="#88cc99">SPI Master + AXI</text>
  <text x="200" y="276" text-anchor="middle" font-size="9" fill="#88cc99">100 MHz sys clk</text>

  <!-- FMC LPC Connector J64 -->
  <rect x="55" y="310" width="50" height="160" rx="4" fill="#2a4a2a" stroke="#7acc7a" stroke-width="1.5"/>
  <text x="80" y="330" text-anchor="middle" font-size="9" fill="#aaffaa" font-weight="bold">FMC</text>
  <text x="80" y="343" text-anchor="middle" font-size="9" fill="#aaffaa">LPC</text>
  <text x="80" y="356" text-anchor="middle" font-size="8" fill="#88cc99">J64</text>
  <!-- FMC pins (ADC) -->
  <text x="80" y="375" text-anchor="middle" font-size="7.5" fill="#ccffcc">ADC</text>
  <text x="80" y="388" text-anchor="middle" font-size="7.5" fill="#ccffcc">CH0-3</text>
  <text x="80" y="401" text-anchor="middle" font-size="7.5" fill="#ccffcc">16-bit</text>
  <text x="80" y="414" text-anchor="middle" font-size="7.5" fill="#ccffcc">LVDS</text>
  <text x="80" y="440" text-anchor="middle" font-size="7" fill="#88cc99">LA00–</text>
  <text x="80" y="452" text-anchor="middle" font-size="7" fill="#88cc99">LA11</text>

  <!-- PMOD JA1 Connector J55 -->
  <rect x="290" y="310" width="52" height="200" rx="4" fill="#2a2a4a" stroke="#7a7acc" stroke-width="2"/>
  <text x="316" y="328" text-anchor="middle" font-size="9" fill="#aaaaff" font-weight="bold">PMOD</text>
  <text x="316" y="341" text-anchor="middle" font-size="9" fill="#aaaaff">JA1</text>
  <text x="316" y="354" text-anchor="middle" font-size="8" fill="#8888cc">J55</text>

  <!-- PMOD pin rows (right side = connection points) -->
  <!-- Pin 1 - SPI_CSN -->
  <circle cx="342" cy="375" r="5" fill="#ff6666" stroke="#cc0000" stroke-width="1.5"/>
  <text x="285" y="379" text-anchor="middle" font-size="8" fill="#ffaaaa">1 CSN</text>
  <!-- Pin 2 - SPI_CLK -->
  <circle cx="342" cy="395" r="5" fill="#ffaa33" stroke="#cc7700" stroke-width="1.5"/>
  <text x="285" y="399" text-anchor="middle" font-size="8" fill="#ffcc88">2 CLK</text>
  <!-- Pin 3 - MOSI -->
  <circle cx="342" cy="415" r="5" fill="#33cc33" stroke="#008800" stroke-width="1.5"/>
  <text x="285" y="419" text-anchor="middle" font-size="8" fill="#88ff88">3 MOSI</text>
  <!-- Pin 4 - MISO -->
  <circle cx="342" cy="435" r="5" fill="#3399ff" stroke="#0055cc" stroke-width="1.5"/>
  <text x="285" y="439" text-anchor="middle" font-size="8" fill="#88ccff">4 MISO</text>
  <!-- Pin 5 - GND -->
  <circle cx="342" cy="455" r="5" fill="#888888" stroke="#333333" stroke-width="1.5"/>
  <text x="285" y="459" text-anchor="middle" font-size="8" fill="#cccccc">5 GND</text>
  <!-- Pin 6 - 3.3V -->
  <circle cx="342" cy="475" r="5" fill="#ffdd00" stroke="#aa8800" stroke-width="1.5"/>
  <text x="285" y="479" text-anchor="middle" font-size="8" fill="#ffee88">6 3.3V</text>

  <!-- JTAG / UART label -->
  <rect x="110" y="450" width="155" height="50" rx="4" fill="#0d3d24" stroke="#5dba7c" stroke-width="1"/>
  <text x="187" y="468" text-anchor="middle" font-size="9" fill="#aaffaa">UART (115200 baud)</text>
  <text x="187" y="482" text-anchor="middle" font-size="9" fill="#aaffaa">JTAG Programming</text>
  <text x="187" y="496" text-anchor="middle" font-size="8" fill="#88cc99">USB-UART / Vivado HW Mgr</text>

  <!-- ═══════════════════ ADAR1000 Board ═══════════════════ -->
  <!-- PCB outline -->
  <rect x="540" y="80" width="320" height="480" rx="12" fill="#1a3a6b" stroke="#0d2a4a" stroke-width="3"/>
  <!-- PCB label -->
  <text x="700" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">ADAR1000</text>
  <text x="700" y="122" text-anchor="middle" font-size="12" fill="#aaccff">Analog Devices Eval Board</text>
  <text x="700" y="138" text-anchor="middle" font-size="10" fill="#8899cc">4-Channel X/Ku-Band Beamformer IC</text>

  <!-- IC outline -->
  <rect x="600" y="155" width="200" height="120" rx="6" fill="#0d2040" stroke="#4a7acc" stroke-width="1.5"/>
  <text x="700" y="198" text-anchor="middle" font-size="12" fill="#4a7acc">ADAR1000BCBZ</text>
  <text x="700" y="216" text-anchor="middle" font-size="10" fill="#7799cc">4-ch Beamformer IC</text>
  <text x="700" y="234" text-anchor="middle" font-size="9" fill="#5577aa">SPI control interface</text>
  <text x="700" y="250" text-anchor="middle" font-size="9" fill="#5577aa">Phase + Gain per ch</text>
  <text x="700" y="266" text-anchor="middle" font-size="9" fill="#5577aa">7-bit: 2.81° / 0.5 dB res</text>

  <!-- SPI Header connector on ADAR1000 board (left side) -->
  <rect x="540" y="310" width="52" height="200" rx="4" fill="#1a2a4a" stroke="#7a7acc" stroke-width="2"/>
  <text x="566" y="328" text-anchor="middle" font-size="9" fill="#aaaaff" font-weight="bold">SPI</text>
  <text x="566" y="341" text-anchor="middle" font-size="9" fill="#aaaaff">HDR</text>
  <text x="566" y="354" text-anchor="middle" font-size="8" fill="#8888cc">P1</text>

  <!-- ADAR1000 SPI pins (left side = connection points) -->
  <!-- ~CS -->
  <circle cx="540" cy="375" r="5" fill="#ff6666" stroke="#cc0000" stroke-width="1.5"/>
  <text x="580" y="379" text-anchor="start" font-size="8" fill="#ffaaaa">~CS</text>
  <!-- SCLK -->
  <circle cx="540" cy="395" r="5" fill="#ffaa33" stroke="#cc7700" stroke-width="1.5"/>
  <text x="580" y="399" text-anchor="start" font-size="8" fill="#ffcc88">SCLK</text>
  <!-- SDIO -->
  <circle cx="540" cy="415" r="5" fill="#33cc33" stroke="#008800" stroke-width="1.5"/>
  <text x="580" y="419" text-anchor="start" font-size="8" fill="#88ff88">SDIO</text>
  <!-- SDO -->
  <circle cx="540" cy="435" r="5" fill="#3399ff" stroke="#0055cc" stroke-width="1.5"/>
  <text x="580" y="439" text-anchor="start" font-size="8" fill="#88ccff">SDO</text>
  <!-- GND -->
  <circle cx="540" cy="455" r="5" fill="#888888" stroke="#333333" stroke-width="1.5"/>
  <text x="580" y="459" text-anchor="start" font-size="8" fill="#cccccc">GND</text>
  <!-- VCC -->
  <circle cx="540" cy="475" r="5" fill="#ffdd00" stroke="#aa8800" stroke-width="1.5"/>
  <text x="580" y="479" text-anchor="start" font-size="8" fill="#ffee88">VCC (3.3V)</text>

  <!-- Antenna ports on ADAR1000 -->
  <rect x="650" y="310" width="180" height="180" rx="6" fill="#0d2040" stroke="#4a7acc" stroke-width="1"/>
  <text x="740" y="330" text-anchor="middle" font-size="10" fill="#7799cc">Antenna Array Ports</text>
  <!-- CH0 -->
  <rect x="665" y="340" width="60" height="28" rx="3" fill="#1a3a6b" stroke="#7a7acc" stroke-width="1"/>
  <text x="695" y="359" text-anchor="middle" font-size="9" fill="#aaccff">CH0 RF</text>
  <!-- CH1 -->
  <rect x="665" y="376" width="60" height="28" rx="3" fill="#1a3a6b" stroke="#7a7acc" stroke-width="1"/>
  <text x="695" y="395" text-anchor="middle" font-size="9" fill="#aaccff">CH1 RF</text>
  <!-- CH2 -->
  <rect x="665" y="412" width="60" height="28" rx="3" fill="#1a3a6b" stroke="#7a7acc" stroke-width="1"/>
  <text x="695" y="431" text-anchor="middle" font-size="9" fill="#aaccff">CH2 RF</text>
  <!-- CH3 -->
  <rect x="665" y="448" width="60" height="28" rx="3" fill="#1a3a6b" stroke="#7a7acc" stroke-width="1"/>
  <text x="695" y="467" text-anchor="middle" font-size="9" fill="#aaccff">CH3 RF</text>
  <!-- arrows to antenna -->
  <text x="748" y="359" font-size="9" fill="#5577aa">──▶ Ant 0</text>
  <text x="748" y="395" font-size="9" fill="#5577aa">──▶ Ant 1</text>
  <text x="748" y="431" font-size="9" fill="#5577aa">──▶ Ant 2</text>
  <text x="748" y="467" font-size="9" fill="#5577aa">──▶ Ant 3</text>

  <!-- ═══════════════════ Jumper wires ═══════════════════ -->
  <!-- SPI_CSN - red wire -->
  <line x1="347" y1="375" x2="535" y2="375" stroke="#ff4444" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="441" y="369" text-anchor="middle" font-size="9" fill="#ff4444">SPI_CSN</text>

  <!-- SPI_CLK - orange wire -->
  <line x1="347" y1="395" x2="535" y2="395" stroke="#ffaa00" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="441" y="389" text-anchor="middle" font-size="9" fill="#ffaa00">SPI_CLK</text>

  <!-- SPI_MOSI - green wire -->
  <line x1="347" y1="415" x2="535" y2="415" stroke="#22bb22" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="441" y="409" text-anchor="middle" font-size="9" fill="#22bb22">SPI_MOSI</text>

  <!-- SPI_MISO - blue wire -->
  <line x1="347" y1="435" x2="535" y2="435" stroke="#2288ff" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="441" y="429" text-anchor="middle" font-size="9" fill="#2288ff">SPI_MISO</text>

  <!-- GND - grey wire -->
  <line x1="347" y1="455" x2="535" y2="455" stroke="#999999" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="441" y="449" text-anchor="middle" font-size="9" fill="#999999">GND</text>

  <!-- 3.3V - yellow wire -->
  <line x1="347" y1="475" x2="535" y2="475" stroke="#ddaa00" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="441" y="469" text-anchor="middle" font-size="9" fill="#ddaa00">3.3V</text>

  <!-- ═══════════════════ Legend ═══════════════════ -->
  <rect x="40" y="570" width="820" height="40" rx="6" fill="#e8eaf6" stroke="#9090b0" stroke-width="1"/>
  <text x="60" y="586" font-size="10" fill="#333">Legend:</text>
  <line x1="115" y1="583" x2="155" y2="583" stroke="#ff4444" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="160" y="587" font-size="9" fill="#333">CSN (Chip Select)</text>
  <line x1="270" y1="583" x2="310" y2="583" stroke="#ffaa00" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="315" y="587" font-size="9" fill="#333">SCLK</text>
  <line x1="365" y1="583" x2="405" y2="583" stroke="#22bb22" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="410" y="587" font-size="9" fill="#333">MOSI/SDIO</text>
  <line x1="490" y1="583" x2="530" y2="583" stroke="#2288ff" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="535" y="587" font-size="9" fill="#333">MISO/SDO</text>
  <line x1="610" y1="583" x2="650" y2="583" stroke="#999999" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="655" y="587" font-size="9" fill="#333">GND</text>
  <line x1="700" y1="583" x2="740" y2="583" stroke="#ddaa00" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="745" y="587" font-size="9" fill="#333">3.3V Power</text>

  <!-- second legend row -->
  <text x="60" y="602" font-size="10" fill="#333">Connectors:</text>
  <text x="135" y="602" font-size="9" fill="#333">ZC702 PMOD JA1 (J55) pins 1-6  →  ADAR1000 Eval Board SPI Header (P1)</text>
  <text x="135" y="612" font-size="9" fill="#888">Dashed lines = jumper wires</text>
</svg>
